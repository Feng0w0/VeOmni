model:
  model_path: Qwen/Qwen3.5-35B-A3B
  moe_implementation: fused
  attn_implementation: flash_attention_2

data:
  train_path: configs/multimodal/data/tulu_sharegpt4v_llavavideo.yaml
  data_type: conversation
  chat_template: qwen3vl
  max_seq_len: 4096
  train_size: 80000000
  mm_configs:
    image_max_pixels: 602112 # 28 * 28 * 768
    video_max_pixels: 602112 # 28 * 28 * 768
    max_frames: 16
    fps: 2.0
    use_audio_in_video: false

train:
  output_dir: qwen3_5_moe_sft
  data_parallel_mode: fsdp2
  enable_reentrant: false
  use_wandb: false
  wandb_project: qwen3_5_moe
  wandb_name: qwen3_5_moe
  expert_parallel_size: 1
  freeze_vit: false
  lr: 1.0e-5
  lr_decay_style: cosine
  num_train_epochs: 2
  micro_batch_size: 1
  global_batch_size: 32
  max_steps: 500
  init_device: meta
  enable_profiling: true
  profile_start_step: 20
  profile_end_step: 21
  profile_record_shapes: true
  ckpt_manager: dcp
